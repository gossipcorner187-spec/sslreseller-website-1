<!DOCTYPE html>
<html>
<head>
  <title>SSL Checker</title>
</head>

<body>

  <h2>SSL Checker</h2>

  <!-- INPUT -->
  <input type="text" id="domain" placeholder="example.com">

  <!-- BUTTON -->
  <button onclick="checkSSL()">Check SSL</button>

  <!-- RESULT -->
  <div id="result"></div>

  <!-- SCRIPT (IMPORTANT: must be inside script tag) -->
  <script>
    async function checkSSL() {
      const domain = document.getElementById("domain").value.trim();
      const resultDiv = document.getElementById("result");

      if (!domain) {
        resultDiv.innerHTML = "Please enter a domain.";
        return;
      }

      resultDiv.innerHTML = "Checking SSL...";

      try {
        const response = await fetch(`https://sslcheckerproject1.vercel.app/api/check-ssl?domain=${domain}`);
        const data = await response.json();

        if (data.status === "PENDING" || data.status === "SCANNING") {
          resultDiv.innerHTML = "Scanning... please wait.";
          return;
        }

        resultDiv.innerHTML = `
          Domain: ${data.domain}<br>
          Grade: ${data.grade}<br>
          Issuer: ${data.issuer}<br>
          Trust: ${data.trusted ? "Trusted" : "Not Trusted"}
        `;

      } catch (err) {
        resultDiv.innerHTML = "Error connecting to backend.";
      }
    }
  </script>

</body>
</html>
