<!DOCTYPE html>
<html>
<head>
  <title>SSL Checker</title>
</head>

<body>

  <h2>SSL Checker</h2>

  <!-- INPUT -->
  <input type="text" id="domain" placeholder="example.com">

  <!-- BUTTON -->
  <button onclick="checkSSL()">Check SSL</button>

  <!-- RESULT -->
  <div id="result" style="margin-top:20px;"></div>

  <!-- SCRIPT -->
  <script>
    let currentDomain = "";

    async function checkSSL() {
      const inputDomain = document.getElementById("domain").value.trim();
      const resultDiv = document.getElementById("result");

      // Store domain only once
      if (inputDomain) {
        currentDomain = inputDomain;
      }

      if (!currentDomain) {
        resultDiv.innerHTML = "Please enter a domain.";
        return;
      }

      resultDiv.innerHTML = "🔄 Checking SSL...";

      try {
        const response = await fetch(`https://sslcheckerproject1.vercel.app/api/check-ssl?domain=${currentDomain}`);

        if (!response.ok) {
          throw new Error("API error");
        }

        const data = await response.json();

        // 🔄 Retry if still scanning
        if (data.status === "PENDING" || data.status === "SCANNING") {
          resultDiv.innerHTML = "🔄 Scanning in progress... retrying in 5 seconds...";
          setTimeout(checkSSL, 5000);
          return;
        }

        // ✅ Final output
        resultDiv.innerHTML = `
          <strong>Domain:</strong> ${data.domain}<br>
          <strong>Grade:</strong> ${data.grade}<br>
          <strong>Issuer:</strong> ${data.issuer}<br>
          <strong>Valid From:</strong> ${new Date(data.valid_from).toDateString()}<br>
          <strong>Valid To:</strong> ${new Date(data.valid_to).toDateString()}<br>
          <strong>Trust:</strong> ${data.trusted ? "✅ Trusted" : "❌ Not Trusted"}<br>

          <br><strong>🔗 Chain of Trust:</strong><br>
          ${data.chain}
        `;

      } catch (err) {
        resultDiv.innerHTML = "⚠️ Temporary issue... retrying...";
        setTimeout(checkSSL, 5000);
      }
    }
  </script>

</body>
</html>
